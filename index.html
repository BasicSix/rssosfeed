<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>RSS-情报矩阵</title>
    <link rel="stylesheet" href="https://unpkg.com/osmosfeed@0/dist/osmosfeed.min.css" />
    <style>
      :root {
        --color-primary: #2563eb;
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
      }
      body {
        background-color: var(--bg-color);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }
      header {
        margin-bottom: 3rem;
        text-align: center;
      }
      /* 这里的网格布局最适合视频封面展示 */
      .feed-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
      }
      .feed-item {
        background: var(--card-bg);
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s;
        border: 1px solid #e2e8f0;
        display: flex;
        flex-direction: column;
      }
      .feed-item:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      /* 自动提取封面图逻辑 */
      .feed-item img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        background: #f1f5f9;
      }
      .content {
        padding: 1rem;
        flex-grow: 1;
      }
      .source {
        font-size: 0.75rem;
        color: var(--color-primary);
        font-weight: 600;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
      }
      .title {
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.4;
        color: #1e293b;
        text-decoration: none;
        display: block;
        margin-bottom: 0.5rem;
      }
      .title:hover {
        color: var(--color-primary);
      }
      .date {
        font-size: 0.75rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1 id="site-title">RSS-情报矩阵</h1>
        <p id="site-description">24/7 自动巡检：AI 动态、行业资讯与创意灵感</p>
      </header>

      <div id="osmosfeed" class="feed-grid">
        <template>
          <article class="feed-item">
            <a :href="link" target="_blank" rel="noopener">
              <img :src="image || 'https://via.placeholder.com/400x225?text=No+Image'" loading="lazy" />
            </a>
            <div class="content">
              <div class="source" v-text="source"></div>
              <a class="title" :href="link" target="_blank" rel="noopener" v-text="title"></a>
              <div class="date" v-text="description.substring(0, 100) + '...'"></div>
              <div class="date" style="margin-top: 10px;" v-text="new Date(pubDate).toLocaleDateString()"></div>
            </div>
          </article>
        </template>
      </div>
    </div>

    <script src="https://unpkg.com/osmosfeed@0/dist/osmosfeed.min.js"></script>
    <script>
      // 初始化，它会自动读取同目录下的 osmosfeed.yaml
      osmosfeed.init();
    </script>
  </body>
</html>
