name: Build and Deploy Archive Feed

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # 解决 Node.js 24 警告，强制环境前瞻
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: "24" # 直接升级到 Node 24，消除警告
          # 移除 cache: 'npm' 以解决找不到 lock 文件的报错

      - name: Install dependencies
        run: npm install # 使用 install 确保即便没有 lock 文件也能生成依赖

      - name: Build the feed
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: rss2.duoweiti.eu.org
          force_orphan: false
